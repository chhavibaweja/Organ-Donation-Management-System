<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Donor Register | OrganLife</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <div class="form-container">
    <h2>Donor Registration</h2>
    <form method="POST">
       <input type="text" name="name" placeholder="Full Name" required>
       <input type="number" name="age" placeholder="Age" required>

    <!-- BLOOD GROUP -->
    <select name="blood_group" required>
      <option value="" disabled selected>Select Blood Group</option>
      <option value="A+">A+</option>
      <option value="A-">A-</option>
      <option value="B+">B+</option>
      <option value="B-">B-</option>
      <option value="AB+">AB+</option>
      <option value="AB-">AB-</option>
      <option value="O+">O+</option>
      <option value="O-">O-</option>
    </select>

    <!-- ORGAN TO DONATE -->
    <select name="organ" required>
      <option value="" disabled selected>Select Organ to Donate</option>
      <option value="Kidney">Kidney</option>
      <option value="Liver">Liver</option>
      <option value="Heart">Heart</option>
      <option value="Lungs">Lungs</option>
      <option value="Pancreas">Pancreas</option>
      <option value="Cornea">Cornea (Eye)</option>
      <option value="Bone Marrow">Bone Marrow</option>
      <option value="Other">Other</option>
    </select>

    <!-- CITY -->
    <select name="city" required>
      <option value="" disabled selected>Select City</option>
      <option value="Delhi">Delhi</option>
      <option value="Mumbai">Mumbai</option>
      <option value="Bangalore">Bangalore</option>
      <option value="Chennai">Chennai</option>
      <option value="Kolkata">Kolkata</option>
      <option value="Hyderabad">Hyderabad</option>
      <option value="Pune">Pune</option>
      <option value="Lucknow">Lucknow</option>
      <option value="Jaipur">Jaipur</option>
      <option value="Other">Other</option>
    </select>

    <input type="text" name="contact" placeholder="Contact Number" required>
    <input type="email" name="email" placeholder="Email" required>
    <input type="password" name="password" placeholder="Password" required>

      <button type="submit" class="submit-btn">Register</button>
    </form>
    <p style="text-align:center; margin-top:0.5rem;">Already registered? <a href="/donor-login">Login here</a></p>
  </div>
</body>
</html>

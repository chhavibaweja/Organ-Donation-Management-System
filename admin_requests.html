<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Admin Requests</title>
  <style>
    table { width: 90%; margin: 20px auto; border-collapse: collapse; }
    th, td { border: 1px solid #ccc; padding: 8px; text-align: center; }
    th { background-color: #ffb6c1; }
    form { display:inline; }
    button { background:#4CAF50; color:white; border:none; padding:6px 12px; cursor:pointer; }
  </style>
</head>
<body>
  <h1 style="text-align:center;">Pending Approval Requests</h1>

  <table>
    <thead>
      <tr>
        <th>Recipient</th>
        <th>Donor</th>
        <th>Organ</th>
        <th>Blood Group</th>
        <th>Status</th>
        <th>Action</th>
      </tr>
    </thead>
    <tbody>
      {% for r in requests %}
      <tr>
        <td>{{ r.recipient }}</td>
        <td>{{ r.donor }}</td>
        <td>{{ r.organ }}</td>
        <td>{{ r.blood_group }}</td>
        <td>{{ r.status }}</td>
        <td>
          {% if r.status != "Approved" %}
          <form action="{{ url_for('approve_request', id=r.id) }}" method="POST">
            <button type="submit">Approve</button>
          </form>
          {% else %}
          Approved
          {% endif %}
        </td>
      </tr>
      {% endfor %}
    </tbody>
  </table>
</body>
</html>

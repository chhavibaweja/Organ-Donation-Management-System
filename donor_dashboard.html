<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Donor Dashboard | OrganLife</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <header>
    <nav class="navbar">
      <div class="logo">OrganLife</div>
      <ul class="nav-links">
        <li><a href="/">Home</a></li>
        <li><a href="/logout">Logout</a></li>
      </ul>
    </nav>
  </header>

  <div class="form-container">
    <h2>Welcome, {{ donor.name or 'Donor' }}</h2>
    <form method="POST">
      <input type="text" name="name" value="{{ donor.name or '' }}" placeholder="Full Name" required>
      <input type="number" name="age" value="{{ donor.age or '' }}" placeholder="Age">
      <input type="text" name="blood_group" value="{{ donor.blood_group or '' }}" placeholder="Blood Group">
      <input type="text" name="organ" value="{{ donor.organ or '' }}" placeholder="Organ">
      <input type="text" name="city" value="{{ donor.city or '' }}" placeholder="City">
      <input type="text" name="contact" value="{{ donor.contact or '' }}" placeholder="Contact">
    </form>

    <div style="margin-top:1rem; text-align:center;">
      <form action="{{ url_for('delete_donor', id=donor.id) }}" method="GET" onsubmit="return confirm('Delete your donor record?');">
        <button type="submit" class="delete-btn">Delete My Entry</button>
      </form>
    </div>
  </div>
</body>
</html>
